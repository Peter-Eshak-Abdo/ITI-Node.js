<html>
  <head>
    <title>link</title>
  </head>
  <body>
    <p id="my-section" style="background-color: red">my specific section</p>

    <!-- link -> anchor tag (a) -->
    <!-- href="" -->

    <!-- 01-link to document & image -->
    <a href="/assets/spiderman.jpg">hello iam a link to image</a>
    <hr />
    <a href="/assets/document.pdf">hello iam a link to document</a>
    <hr />

    <!-- 02-link to email -->
    <!-- mailto:    ---    ?subject=    ----  &body=    -->
    <a
      href="mailto:yassersalem@gmail.com?subject=Important Note&body= hello dear iam"
      >link to email</a
    >
    <!-- <a href="mailto:          ?subject=      &body=      "></a> -->

    <hr />

    <!-- 03-external link -->
    <a href="https://www.youtube.com/" target="_self"> go to youtube (self)</a>
    <a href="https://www.youtube.com/" target="_blank">
      go to youtube (blank)</a
    >

    <hr />

    <!-- 04-Internal section link -->
    <!-- id for the element (section) -->
    <!-- href="#" -->
    <a href="#my-section">go to specific section</a>
  </body>
</html>
