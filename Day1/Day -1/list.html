<html>
  <head>
    <title>list</title>
  </head>
  <body>
    <!-- unordered list -->
    <ul>
      <!-- list item -->
      <li>one</li>
      <li>two</li>
      <li>three</li>
    </ul>

    <!-- ordered list -->
    <ol type="1" start="6">
      <!-- list item -->
      <li>one</li>
      <li>two</li>
      <li>three</li>
    </ol>

    <!-- definition list -->
    <dl>
      <dt>HTML</dt>
      <dd>hyper text markup language</dd>

      <dt>CSS</dt>
      <dd>cascading style sheet</dd>
    </dl>

    <!-- nested list -->

    <ul>
      <li>one 
        <ol>
            <li>fruits</li>
            <li>food</li>
        </ol>
      </li>
      <li>two
        <ol>
            <li>football</li>
            <li>swim</li>
        </ol>
      </li>
      <li>three
        <ul>
            <li>html</li>
            <li>css</li>
        </ul>
      </li>
    </ul>
  </body>
</html>
