<html>
  <head>
    <title>table</title>
  </head>



  <body>
    <!--
    cellspacing="5"
    cellpadding="10"
    bgcolor="lightblue"
    <font color="red"> data </font>

    colspan -> span on td (columns)
    -->
    <table width="600" border="2" align="center" cellpadding="10" cellspacing="5">
        <thead>
            <tr bgcolor="lightblue">
                <th>Name</th>
                <th>Salary</th>
                <th>Position</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td><font color="red"> Mohamed </font></td>
                <td>1200</td>
                <td>front-end developer</td>
            </tr>

            <tr>
                <td>Ahmed</td>
                <td>5000</td>
                <td>backend developer</td>
            </tr>

            <tr>
                <td rowspan="2">Ali</td>
                <td>3000</td>
                <td>tester</td>
            </tr>
            <tr>
                <td>2000</td>
                <td>mobile developer</td>
            </tr>

        </tbody>


        <tfoot>
            <tr>
                <td align="center" bgcolor="lightpink" colspan="3">copy right &copy; 2026</td>
            </tr>
        </tfoot>

    </table>
  </body>
</html>
