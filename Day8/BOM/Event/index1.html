<!DOCTYPE html>
<html lang="en">

  <head>
    <title>Preve mouse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
  </head>

  <body>

    <h2>Right Click Disabled</h2>

    <script>
      document.oncontextmenu = function (e) {
        e.preventDefault();
      }
    </script>

  </body>

</html>
