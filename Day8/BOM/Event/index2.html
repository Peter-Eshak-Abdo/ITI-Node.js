<!DOCTYPE html>
<html lang="en">

  <head>
    <title>Press key</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
  </head>

  <body>

    <h2>Press Any Key</h2>

    <script>

      document.onkeydown = function (e) {

        alert(
          "ASCII Code = " + e.keyCode +
          "\nCtrl = " + e.ctrlKey +
          "\nShift = " + e.shiftKey +
          "\nAlt = " + e.altKey
        );

      }

    </script>

  </body>

</html>
