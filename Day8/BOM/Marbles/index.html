<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Marbles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        text-align: center;
        margin-top: 100px;
      }

      img {
        width: 60px;
        margin: 20px;
      }
    </style>
  </head>

  <body>
    <img src="marble1.jpg" class="ball" title="Lamb">
    <img src="marble1.jpg" class="ball" title="Lamb">
    <img src="marble1.jpg" class="ball" title="Lamb">
    <img src="marble1.jpg" class="ball" title="Lamb">
    <img src="marble1.jpg" class="ball" title="Lamb">

    <script>
      var balls = document.getElementsByClassName("ball");
      var index = 0;
      balls[index].src = "marble2.jpg";
      var timer = setInterval(move, 1000);
      function move() {
        balls[index].src = "marble1.jpg";
        index++;
        if (index == balls.length) {
          index = 0;
        }
        balls[index].src = "marble2.jpg";
      }

      for (var i = 0; i < balls.length; i++) {
        balls[i].onmouseover = function () {
          clearInterval(timer);
        }
        balls[i].onmouseout = function () {
          clearInterval(timer);
          timer = setInterval(move, 1000);
        }
      }
    </script>

  </body>

</html>
